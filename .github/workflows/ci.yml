name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CGO dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build backend
        run: cd backend && go build ./cmd/server

      - name: Vet backend
        run: cd backend && go vet ./...

      - name: Test backend
        run: cd backend && go test ./... -count=1 -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build:frontend

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Test frontend
        run: npm run test:frontend

  deploy-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate deploy scripts
        run: shellcheck deploy/proxmox/jdr.sh deploy/proxmox/jdr-install.sh deploy/proxmox/jdr-update.sh
